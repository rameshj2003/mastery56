<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mastery Tracker</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0 1rem 4rem;
  position: relative;
  overflow-x: hidden;
  background: #0d1117;
  color: #f0efe8;
}

/* ── Background scene ── */
.bg-scene {
  position: fixed;
  inset: 0;
  z-index: 0;
  overflow: hidden;
}

.bg-scene canvas {
  width: 100%;
  height: 100%;
  display: block;
}

/* Stars */
.stars {
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 20% 10%, #1a2040 0%, #070c1a 60%, #0d1117 100%);
}

/* Overlay gradient so card is readable */
.bg-overlay {
  position: fixed;
  inset: 0;
  z-index: 1;
  background: linear-gradient(to bottom,
    rgba(7,12,26,0.35) 0%,
    rgba(7,12,26,0.15) 40%,
    rgba(7,12,26,0.55) 100%
  );
}

/* ── Layout ── */
.content {
  position: relative;
  z-index: 2;
  width: 100%;
  max-width: 480px;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-top: 1.5rem;
}

header {
  text-align: center;
  margin-bottom: 1.5rem;
}

header h1 {
  font-size: 1.9rem;
  font-weight: 700;
  letter-spacing: -0.02em;
  color: #fff;
  text-shadow: 0 2px 18px rgba(80,60,200,0.5);
}

header p {
  font-size: 0.9rem;
  color: rgba(255,255,255,0.55);
  margin-top: 0.3rem;
}

/* ── Card ── */
.card {
  background: rgba(18,18,28,0.82);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  border: 0.5px solid rgba(255,255,255,0.13);
  border-radius: 16px;
  padding: 1.5rem;
  width: 100%;
}

/* ── Skill row ── */
.row {
  display: flex;
  gap: 8px;
  align-items: center;
  margin-bottom: 1rem;
}

.row label {
  font-size: 12px;
  color: rgba(255,255,255,0.45);
  white-space: nowrap;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

.inp {
  flex: 1;
  padding: 9px 12px;
  border: 0.5px solid rgba(255,255,255,0.15);
  border-radius: 8px;
  font-size: 14px;
  background: rgba(255,255,255,0.07);
  color: #f0efe8;
  outline: none;
  transition: border-color 0.2s;
}
.inp:focus { border-color: rgba(160,140,255,0.6); }
.inp::placeholder { color: rgba(255,255,255,0.25); }

/* ── Globe ── */
.globe-wrap {
  display: flex;
  justify-content: center;
  margin: 0.5rem 0 1.25rem;
}

/* ── Stats ── */
.stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-bottom: 1.25rem;
}

.stat {
  background: rgba(255,255,255,0.06);
  border-radius: 8px;
  padding: 12px 8px;
  text-align: center;
}

.stat-val {
  font-size: 1.25rem;
  font-weight: 600;
  color: #fff;
  line-height: 1.2;
}

.stat-label {
  font-size: 10px;
  color: rgba(255,255,255,0.38);
  margin-top: 3px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

/* ── Inputs ── */
.input-row {
  display: flex;
  gap: 8px;
  margin-bottom: 0.75rem;
}

.btn-add {
  padding: 10px 20px;
  border: none;
  border-radius: 8px;
  background: linear-gradient(135deg, #7f77dd, #534AB7);
  color: #fff;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: opacity 0.15s, transform 0.1s;
  white-space: nowrap;
}
.btn-add:hover { opacity: 0.88; }
.btn-add:active { transform: scale(0.97); }

/* ── Target row ── */
.target-row {
  display: flex;
  gap: 8px;
  align-items: center;
  margin-bottom: 1rem;
  background: rgba(255,255,255,0.04);
  border-radius: 8px;
  padding: 8px 12px;
}

.target-row label {
  font-size: 12px;
  color: rgba(255,255,255,0.45);
  white-space: nowrap;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

.btn-set {
  padding: 6px 14px;
  border: 0.5px solid rgba(255,255,255,0.2);
  border-radius: 6px;
  background: rgba(255,255,255,0.08);
  color: rgba(255,255,255,0.7);
  font-size: 12px;
  cursor: pointer;
  white-space: nowrap;
}
.btn-set:hover { background: rgba(255,255,255,0.14); }

/* ── Log ── */
.log-section {
  margin-top: 1.25rem;
  border-top: 0.5px solid rgba(255,255,255,0.08);
  padding-top: 1rem;
}

.log-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}

.log-title {
  font-size: 11px;
  font-weight: 500;
  color: rgba(255,255,255,0.35);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

.btn-reset {
  font-size: 12px;
  color: rgba(255,100,100,0.55);
  background: none;
  border: none;
  cursor: pointer;
  text-decoration: underline;
  padding: 0;
}
.btn-reset:hover { color: rgba(255,80,80,0.9); }

.log-list {
  max-height: 180px;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: rgba(255,255,255,0.1) transparent;
}

.log-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 7px 0;
  border-bottom: 0.5px solid rgba(255,255,255,0.06);
  font-size: 13px;
  gap: 8px;
}
.log-item:last-child { border-bottom: none; }
.log-hrs { font-weight: 600; color: #afa9ec; white-space: nowrap; }
.log-note { color: rgba(255,255,255,0.5); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 12px; }
.log-date { color: rgba(255,255,255,0.25); font-size: 11px; white-space: nowrap; }
.empty-log { font-size: 13px; color: rgba(255,255,255,0.25); text-align: center; padding: 1rem 0; }

footer {
  position: relative;
  z-index: 2;
  margin-top: 1.2rem;
  font-size: 11px;
  color: rgba(255,255,255,0.25);
  text-align: center;
}

/* ── Celebration overlay ── */
#celebration {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 100;
  background: rgba(5,4,20,0.88);
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 2rem;
}

#celebration.show { display: flex; }

.cel-title {
  font-size: 2.2rem;
  font-weight: 700;
  color: #fff;
  text-shadow: 0 0 40px rgba(180,150,255,0.8);
  margin-bottom: 0.5rem;
  animation: popIn 0.6s cubic-bezier(0.34,1.56,0.64,1) forwards;
}

.cel-sub {
  font-size: 1.1rem;
  color: rgba(255,255,255,0.7);
  margin-bottom: 2rem;
  animation: fadeUp 0.8s 0.3s ease both;
}

.cel-btn {
  padding: 12px 28px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(135deg, #7f77dd, #534AB7);
  color: #fff;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  animation: fadeUp 0.8s 0.5s ease both;
}

#confetti-canvas {
  position: absolute;
  inset: 0;
  pointer-events: none;
}

@keyframes popIn {
  from { transform: scale(0.4); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

@keyframes fadeUp {
  from { transform: translateY(20px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}
</style>
</head>
<body>

<!-- Background -->
<div class="bg-scene">
  <div class="stars"></div>
  <canvas id="bg-canvas"></canvas>
</div>
<div class="bg-overlay"></div>

<!-- Celebration overlay -->
<div id="celebration">
  <canvas id="confetti-canvas"></canvas>
  <div class="cel-title" id="cel-title">🏆 Rammy is proud of you!</div>
  <div class="cel-sub" id="cel-sub">You've reached your goal. You are a Master.</div>
  <button class="cel-btn" onclick="closeCelebration()">Keep going →</button>
</div>

<!-- Main content -->
<div class="content">
  <header>
    <h1>Mastery Tracker</h1>
    <p>Fill the bowl. Master your craft.</p>
  </header>

  <div class="card">

    <div class="row">
      <label for="skill-name">Skill</label>
      <input class="inp" type="text" id="skill-name" placeholder="e.g. Guitar, Coding, Drawing..." maxlength="60" />
    </div>

    <div class="target-row">
      <label for="target-input">Target (hours)</label>
      <input class="inp" type="number" id="target-input" min="1" step="1" style="max-width:110px;" placeholder="10000" />
      <button class="btn-set" onclick="setTarget()">Set target</button>
    </div>

    <div class="globe-wrap">
      <canvas id="globe" width="260" height="270"></canvas>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="stat-val" id="st-total">0</div>
        <div class="stat-label">Hours</div>
      </div>
      <div class="stat">
        <div class="stat-val" id="st-pct">0%</div>
        <div class="stat-label">Done</div>
      </div>
      <div class="stat">
        <div class="stat-val" id="st-left">—</div>
        <div class="stat-label">Remaining</div>
      </div>
    </div>

    <input class="inp" type="text" id="session-note" placeholder="Session note (optional)" maxlength="80" style="width:100%;margin-bottom:8px;" />

    <div class="input-row">
      <input class="inp" type="number" id="hour-input" placeholder="Hours to add (e.g. 1.5)" min="0.1" step="0.5" />
      <button class="btn-add" onclick="addHours()">+ Add</button>
    </div>

    <div class="log-section">
      <div class="log-header">
        <span class="log-title">Session history</span>
        <button class="btn-reset" onclick="confirmReset()">Reset all</button>
      </div>
      <div class="log-list" id="log-list">
        <div class="empty-log">No sessions yet. Start logging!</div>
      </div>
    </div>
  </div>

  <footer>Data saved in your browser &mdash; works offline &mdash; all progress is yours</footer>
</div>

<script>
/* ═══════════════════════════════
   STATE
═══════════════════════════════ */
let state = { skill: '', target: 10000, total: 0, sessions: [] };
let animPct = 0, targetPct = 0;
let waveT = 0;
let celebrationShown = false;

function load() {
  try {
    const s = localStorage.getItem('mastery_v2');
    if (s) state = JSON.parse(s);
  } catch(e) {}
  state.target = state.target || 10000;
  document.getElementById('skill-name').value = state.skill || '';
  document.getElementById('target-input').value = state.target;
  updateStats();
  renderLog();
  animPct = Math.min(state.total / state.target, 1);
  targetPct = animPct;
}

function save() {
  state.skill = document.getElementById('skill-name').value.trim();
  localStorage.setItem('mastery_v2', JSON.stringify(state));
}

/* ═══════════════════════════════
   ACTIONS
═══════════════════════════════ */
function setTarget() {
  const v = parseInt(document.getElementById('target-input').value);
  if (!v || v < 1) return;
  state.target = v;
  save();
  updateStats();
  animPct = Math.min(state.total / state.target, 1);
  targetPct = animPct;
}

function addHours() {
  const inp = document.getElementById('hour-input');
  const noteEl = document.getElementById('session-note');
  const val = parseFloat(inp.value);
  if (!val || val <= 0) { inp.focus(); return; }
  const wasComplete = state.total >= state.target;
  state.total = Math.min(state.total + val, state.target * 10);
  state.sessions.unshift({
    hrs: val,
    note: noteEl.value.trim(),
    date: new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric',hour:'2-digit',minute:'2-digit'})
  });
  inp.value = '';
  noteEl.value = '';
  save();
  updateStats();
  renderLog();
  animateTo(Math.min(state.total / state.target, 1));
  if (!wasComplete && state.total >= state.target) {
    setTimeout(showCelebration, 900);
  }
}

function updateStats() {
  const t = state.total, tg = state.target;
  const pct = Math.min(t / tg, 1);
  document.getElementById('st-total').textContent = fmt(t);
  document.getElementById('st-pct').textContent = Math.round(pct * 100) + '%';
  const left = Math.max(0, tg - t);
  document.getElementById('st-left').textContent = left > 0 ? fmt(left) : '✓ Done';
}

function fmt(n) {
  if (n >= 1000) return (n/1000).toFixed(1) + 'k';
  return n % 1 === 0 ? n.toString() : n.toFixed(1);
}

function renderLog() {
  const el = document.getElementById('log-list');
  if (!state.sessions.length) {
    el.innerHTML = '<div class="empty-log">No sessions yet. Start logging!</div>';
    return;
  }
  el.innerHTML = state.sessions.map(s =>
    `<div class="log-item">
      <span class="log-hrs">+${s.hrs}h</span>
      <span class="log-note">${s.note||''}</span>
      <span class="log-date">${s.date}</span>
    </div>`
  ).join('');
}

function confirmReset() {
  if (confirm('Reset all progress? This cannot be undone.')) {
    state = { skill: state.skill, target: state.target, total: 0, sessions: [] };
    celebrationShown = false;
    save();
    updateStats();
    renderLog();
    animPct = 0; targetPct = 0;
  }
}

/* ═══════════════════════════════
   CELEBRATION
═══════════════════════════════ */
function showCelebration() {
  const skill = state.skill || 'your skill';
  document.getElementById('cel-title').textContent = '🏆 Rammy is proud of you!';
  document.getElementById('cel-sub').textContent =
    `You've mastered ${skill} with ${fmt(state.target)} hours of dedication. You are extraordinary.`;
  document.getElementById('celebration').classList.add('show');
  launchConfetti();
}

function closeCelebration() {
  document.getElementById('celebration').classList.remove('show');
}

/* confetti */
function launchConfetti() {
  const canvas = document.getElementById('confetti-canvas');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');
  const pieces = [];
  const colors = ['#afa9ec','#7f77dd','#5dcaa5','#fac775','#ed93b1','#fff','#85b7eb'];
  for (let i = 0; i < 160; i++) {
    pieces.push({
      x: Math.random() * canvas.width,
      y: -20 - Math.random() * 200,
      r: 4 + Math.random() * 6,
      d: 2 + Math.random() * 3,
      color: colors[Math.floor(Math.random()*colors.length)],
      tilt: Math.random() * 10 - 5,
      tiltSpeed: 0.1 + Math.random() * 0.3,
      angle: 0
    });
  }
  let frame = 0;
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    pieces.forEach(p => {
      p.angle += p.tiltSpeed;
      p.tilt = Math.sin(p.angle) * 12;
      p.y += p.d;
      p.x += Math.sin(p.angle) * 1.2;
      ctx.beginPath();
      ctx.lineWidth = p.r / 2;
      ctx.strokeStyle = p.color;
      ctx.moveTo(p.x + p.tilt + p.r/4, p.y);
      ctx.lineTo(p.x + p.tilt, p.y + p.tilt + p.r/4);
      ctx.stroke();
    });
    frame++;
    if (frame < 220) requestAnimationFrame(draw);
    else ctx.clearRect(0,0,canvas.width,canvas.height);
  }
  draw();
}

/* ═══════════════════════════════
   GLOBE ANIMATION
═══════════════════════════════ */
function animateTo(target) {
  targetPct = Math.min(target, 1);
  function step() {
    animPct += (targetPct - animPct) * 0.07;
    if (Math.abs(targetPct - animPct) < 0.0005) animPct = targetPct;
    if (animPct !== targetPct) requestAnimationFrame(step);
  }
  step();
}

function drawGlobe() {
  const c = document.getElementById('globe');
  const ctx = c.getContext('2d');
  const W = c.width, H = c.height;
  ctx.clearRect(0, 0, W, H);

  const pct = animPct;
  const cx = W / 2, cy = H / 2 + 6;
  const R = 105;

  const gridCol = 'rgba(255,255,255,0.07)';
  const ringCol = 'rgba(255,255,255,0.22)';

  ctx.save();
  ctx.beginPath();
  ctx.arc(cx, cy, R, 0, Math.PI*2);
  ctx.strokeStyle = ringCol;
  ctx.lineWidth = 1.5;
  ctx.stroke();

  ctx.strokeStyle = gridCol;
  ctx.lineWidth = 0.7;
  for (let i = 0; i < 7; i++) {
    const a = (i/7)*Math.PI;
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(a);
    ctx.beginPath();
    ctx.ellipse(0, 0, R*0.3, R, 0, 0, Math.PI*2);
    ctx.stroke();
    ctx.restore();
  }
  for (let lat = -0.65; lat <= 0.65; lat += 0.325) {
    const y = cy + lat*R;
    const rr = Math.sqrt(Math.max(0, R*R-(lat*R)*(lat*R)));
    ctx.beginPath();
    ctx.ellipse(cx, y, rr, rr*0.28, 0, 0, Math.PI*2);
    ctx.stroke();
  }

  const fillH = pct * R * 2;
  const fillY = cy + R - fillH;

  ctx.save();
  ctx.beginPath();
  ctx.arc(cx, cy, R-1, 0, Math.PI*2);
  ctx.clip();

  if (pct > 0) {
    const wA = pct < 0.98 ? 4.5 : 0.3;
    ctx.beginPath();
    ctx.moveTo(cx-R-4, fillY);
    for (let x = cx-R-4; x <= cx+R+4; x+=2) {
      const wave = Math.sin((x-cx)*0.055 + waveT)*wA +
                   Math.sin((x-cx)*0.1 - waveT*1.4)*wA*0.4;
      ctx.lineTo(x, fillY + wave);
    }
    ctx.lineTo(cx+R+4, cy+R+10);
    ctx.lineTo(cx-R-4, cy+R+10);
    ctx.closePath();

    let c1, c2;
    if (pct < 0.4) {
      c1='rgba(93,202,165,0.82)'; c2='rgba(8,80,65,0.9)';
    } else if (pct < 0.75) {
      c1='rgba(133,183,235,0.82)'; c2='rgba(12,68,124,0.9)';
    } else {
      c1='rgba(175,169,236,0.88)'; c2='rgba(60,52,137,0.92)';
    }
    const grad = ctx.createLinearGradient(cx, fillY, cx, cy+R);
    grad.addColorStop(0, c1);
    grad.addColorStop(1, c2);
    ctx.fillStyle = grad;
    ctx.fill();

    if (pct > 0.04 && pct < 0.98) {
      const bubs = [{bx:cx-18,by:fillY-15,r:3},{bx:cx+28,by:fillY-28,r:2},{bx:cx-5,by:fillY-40,r:1.5}];
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      bubs.forEach(b => {
        if (b.by > cy-R+5 && b.by < cy+R-5) {
          ctx.beginPath();
          ctx.arc(b.bx, b.by+Math.sin(waveT*0.6+b.bx)*3, b.r, 0, Math.PI*2);
          ctx.fill();
        }
      });
    }
  }
  ctx.restore();

  ctx.beginPath();
  ctx.arc(cx, cy, R, 0, Math.PI*2);
  ctx.strokeStyle = ringCol;
  ctx.lineWidth = 2;
  ctx.stroke();

  ctx.beginPath();
  ctx.ellipse(cx, cy+R+4, R*0.52, 9, 0, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba(255,255,255,0.12)';
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.fillStyle = 'rgba(255,255,255,0.04)';
  ctx.fill();

  const onFill = pct > 0.38;
  ctx.fillStyle = onFill ? '#fff' : 'rgba(255,255,255,0.9)';
  ctx.font = `700 ${pct===1?22:26}px -apple-system,sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(Math.round(pct*100)+'%', cx, cy+(pct>0.1?6:-6));
  if (pct===1) {
    ctx.font='500 13px -apple-system,sans-serif';
    ctx.fillStyle='rgba(255,255,255,0.75)';
    ctx.fillText('MASTERED', cx, cy+26);
  }

  ctx.restore();
}

/* ═══════════════════════════════
   BACKGROUND — Shiva temple + snowy mountains
═══════════════════════════════ */
function drawBg() {
  const canvas = document.getElementById('bg-canvas');
  const W = canvas.width = window.innerWidth;
  const H = canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');

  /* Sky */
  const sky = ctx.createLinearGradient(0,0,0,H*0.65);
  sky.addColorStop(0,'#07091a');
  sky.addColorStop(0.3,'#0d1230');
  sky.addColorStop(0.65,'#1a1a38');
  sky.addColorStop(1,'#2a1f3a');
  ctx.fillStyle = sky;
  ctx.fillRect(0,0,W,H);

  /* Stars */
  const starData = [];
  const rng = mulberry32(42);
  for (let i=0; i<200; i++) {
    starData.push({x:rng()*W, y:rng()*H*0.62, r:0.4+rng()*1.4, a:0.4+rng()*0.6});
  }
  starData.forEach(s=>{
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,255,255,${s.a})`;
    ctx.fill();
  });

  /* Moon */
  const mx=W*0.82, my=H*0.1, mr=H*0.045;
  const mg=ctx.createRadialGradient(mx,my,0,mx,my,mr*2);
  mg.addColorStop(0,'rgba(220,210,255,0.18)');
  mg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=mg; ctx.beginPath(); ctx.arc(mx,my,mr*2,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(mx,my,mr,0,Math.PI*2);
  const mc=ctx.createRadialGradient(mx-mr*0.2,my-mr*0.2,0,mx,my,mr);
  mc.addColorStop(0,'#e8e0f8'); mc.addColorStop(1,'#b8aee8');
  ctx.fillStyle=mc; ctx.fill();

  /* Far snowy mountains */
  const mH = H*0.55;
  function mountain(peaks, col, shadow) {
    ctx.beginPath();
    ctx.moveTo(0,H);
    peaks.forEach(p=>ctx.lineTo(p[0]*W, p[1]*H));
    ctx.lineTo(W,H);
    ctx.closePath();
    ctx.fillStyle=col;
    ctx.fill();
    /* snow caps */
    if (shadow) {
      peaks.forEach(p=>{
        if (p[2]) {
          const px=p[0]*W, py=p[1]*H, sh=p[2]*H;
          ctx.beginPath();
          ctx.moveTo(px,py);
          ctx.lineTo(px-sh*0.7,py+sh);
          ctx.lineTo(px+sh*0.8,py+sh);
          ctx.closePath();
          ctx.fillStyle='rgba(230,228,248,0.88)';
          ctx.fill();
        }
      });
    }
  }

  /* Layer 1 — farthest peaks */
  mountain([
    [0,0.68],[0.08,0.38],[0.15,0.48],[0.23,0.32],[0.32,0.44],
    [0.42,0.28],[0.5,0.42],[0.6,0.3],[0.7,0.45],[0.8,0.35],[0.9,0.48],[1,0.55]
  ],'rgba(28,26,58,0.9)',false);

  /* Snow caps layer1 */
  const peaks1=[[0.08,0.38,0.06],[0.23,0.32,0.07],[0.42,0.28,0.09],[0.6,0.3,0.08],[0.8,0.35,0.07]];
  peaks1.forEach(p=>{
    const px=p[0]*W,py=p[1]*H,sh=p[2]*H;
    ctx.beginPath();
    ctx.moveTo(px,py);
    ctx.lineTo(px-sh*0.75,py+sh);
    ctx.lineTo(px+sh*0.85,py+sh);
    ctx.closePath();
    ctx.fillStyle='rgba(200,196,240,0.75)';
    ctx.fill();
  });

  /* Layer 2 — mid mountains */
  mountain([
    [0,0.75],[0.07,0.55],[0.14,0.65],[0.22,0.5],[0.3,0.62],
    [0.38,0.48],[0.48,0.6],[0.55,0.46],[0.65,0.58],[0.73,0.5],[0.82,0.62],[0.92,0.54],[1,0.65]
  ],'rgba(20,18,48,0.95)',false);

  const peaks2=[[0.07,0.55,0.05],[0.22,0.5,0.06],[0.38,0.48,0.07],[0.55,0.46,0.07],[0.73,0.5,0.06]];
  peaks2.forEach(p=>{
    const px=p[0]*W,py=p[1]*H,sh=p[2]*H;
    ctx.beginPath();
    ctx.moveTo(px,py);
    ctx.lineTo(px-sh*0.7,py+sh);
    ctx.lineTo(px+sh*0.8,py+sh);
    ctx.closePath();
    ctx.fillStyle='rgba(220,218,255,0.82)';
    ctx.fill();
  });

  /* Foothills */
  mountain([
    [0,0.82],[0.12,0.72],[0.25,0.78],[0.4,0.7],[0.55,0.76],[0.7,0.68],[0.85,0.74],[1,0.72]
  ],'rgba(14,12,32,0.98)',false);

  /* Ground / snow field */
  const ground = ctx.createLinearGradient(0,H*0.78,0,H);
  ground.addColorStop(0,'#1a1830');
  ground.addColorStop(0.25,'#22203c');
  ground.addColorStop(0.6,'#0e0c1e');
  ground.addColorStop(1,'#070510');
  ctx.fillStyle=ground;
  ctx.fillRect(0,H*0.76,W,H*0.24);

  /* Snow ground glow */
  const sg=ctx.createLinearGradient(0,H*0.76,0,H*0.88);
  sg.addColorStop(0,'rgba(180,170,240,0.12)');
  sg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=sg;
  ctx.fillRect(0,H*0.76,W,H*0.12);

  /* ── Shiva Temple ── */
  drawTemple(ctx, W, H);

  /* Foreground overlay gradient (fog bottom) */
  const fog=ctx.createLinearGradient(0,H*0.88,0,H);
  fog.addColorStop(0,'rgba(0,0,0,0)');
  fog.addColorStop(1,'rgba(5,3,15,0.7)');
  ctx.fillStyle=fog;
  ctx.fillRect(0,H*0.88,W,H*0.12);
}

function drawTemple(ctx, W, H) {
  /* Center temple at W*0.5 */
  const tx = W * 0.5;
  const baseY = H * 0.82;
  const scale = Math.min(W, H*1.2) * 0.0022;

  /* Lamp glow behind temple */
  const glow=ctx.createRadialGradient(tx,baseY-60*scale,0,tx,baseY-60*scale,130*scale);
  glow.addColorStop(0,'rgba(255,200,100,0.18)');
  glow.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=glow;
  ctx.fillRect(tx-160*scale, baseY-200*scale, 320*scale, 200*scale);

  function fillPoly(pts, color) {
    ctx.beginPath();
    ctx.moveTo(tx+pts[0]*scale, baseY+pts[1]*scale);
    for (let i=2;i<pts.length;i+=2) ctx.lineTo(tx+pts[i]*scale, baseY+pts[i+1]*scale);
    ctx.closePath();
    ctx.fillStyle=color;
    ctx.fill();
  }

  function strokePoly(pts, color, lw=0.5) {
    ctx.beginPath();
    ctx.moveTo(tx+pts[0]*scale, baseY+pts[1]*scale);
    for (let i=2;i<pts.length;i+=2) ctx.lineTo(tx+pts[i]*scale, baseY+pts[i+1]*scale);
    ctx.closePath();
    ctx.strokeStyle=color;
    ctx.lineWidth=lw*scale;
    ctx.stroke();
  }

  const stone = 'rgba(35,30,65,0.97)';
  const stoneMid = 'rgba(48,42,85,0.97)';
  const stoneLight = 'rgba(68,58,110,0.95)';
  const stoneEdge = 'rgba(90,78,140,0.7)';
  const gold = 'rgba(200,160,50,0.9)';
  const goldLight = 'rgba(240,200,80,0.95)';

  /* Platform / steps */
  fillPoly([-120,0, 120,0, 110,-12, -110,-12], stone);
  fillPoly([-110,-12, 110,-12, 95,-22, -95,-22], stoneMid);
  fillPoly([-95,-22, 95,-22, 80,-30, -80,-30], stoneLight);
  strokePoly([-120,0,120,0,110,-12,-110,-12], stoneEdge);
  strokePoly([-110,-12,110,-12,95,-22,-95,-22], stoneEdge);

  /* Main sanctum body */
  fillPoly([-55,-30, 55,-30, 50,-115, -50,-115], stone);
  strokePoly([-55,-30,55,-30,50,-115,-50,-115], stoneEdge);

  /* Mandapa (porch) */
  fillPoly([-80,-30, -55,-30, -55,-80, -80,-80], stoneMid);
  fillPoly([55,-30, 80,-30, 80,-80, 55,-80], stoneMid);
  strokePoly([-80,-30,-55,-30,-55,-80,-80,-80], stoneEdge);
  strokePoly([55,-30,80,-30,80,-80,55,-80], stoneEdge);

  /* Mandapa roof */
  fillPoly([-88,-80, 88,-80, 70,-105, -70,-105], stoneMid);
  strokePoly([-88,-80,88,-80,70,-105,-70,-105], stoneEdge);
  fillPoly([-70,-105, 70,-105, 52,-118, -52,-118], stoneLight);
  strokePoly([-70,-105,70,-105,52,-118,-52,-118], stoneEdge);

  /* Shikhara tiers (rising spire) */
  const tiers = [
    [-50,-115, 50,-115, 42,-138, -42,-138],
    [-42,-138, 42,-138, 34,-158, -34,-158],
    [-34,-158, 34,-158, 26,-175, -26,-175],
    [-26,-175, 26,-175, 18,-190, -18,-190],
    [-18,-190, 18,-190, 12,-202, -12,-202],
    [-12,-202, 12,-202, 7,-212,  -7,-212],
    [-7,-212,   7,-212, 4,-220,  -4,-220],
  ];
  tiers.forEach((t,i)=>{
    const shade = i%2===0 ? stone : stoneMid;
    fillPoly(t, shade);
    strokePoly(t, stoneEdge, 0.4);
  });

  /* Amalaka (disc at top of shikhara) */
  ctx.beginPath();
  ctx.ellipse(tx, baseY-225*scale, 12*scale, 5*scale, 0, 0, Math.PI*2);
  ctx.fillStyle=gold; ctx.fill();
  ctx.strokeStyle=goldLight; ctx.lineWidth=0.8*scale; ctx.stroke();

  /* Kalasha (pot finial) */
  fillPoly([-4,-230, 4,-230, 3,-242, -3,-242], gold);
  ctx.beginPath();
  ctx.arc(tx, baseY-245*scale, 5*scale, 0, Math.PI*2);
  ctx.fillStyle=goldLight; ctx.fill();

  /* Flag / trident finial */
  ctx.beginPath();
  ctx.moveTo(tx, baseY-250*scale);
  ctx.lineTo(tx, baseY-275*scale);
  ctx.strokeStyle=gold; ctx.lineWidth=1.5*scale; ctx.stroke();
  /* Trident prongs */
  [[-8,-268],[0,-278],[8,-268]].forEach(p=>{
    ctx.beginPath();
    ctx.moveTo(tx+p[0]*scale, baseY+p[1]*scale);
    ctx.lineTo(tx+p[0]*scale, baseY+(p[1]-10)*scale);
    ctx.strokeStyle=goldLight; ctx.lineWidth=1.2*scale; ctx.stroke();
  });

  /* Doorway */
  ctx.beginPath();
  ctx.roundRect(tx-12*scale, baseY-80*scale, 24*scale, 50*scale, [4*scale,4*scale,0,0]);
  ctx.fillStyle='rgba(5,3,20,0.95)';
  ctx.fill();
  ctx.strokeStyle='rgba(200,160,50,0.5)'; ctx.lineWidth=0.7*scale; ctx.stroke();

  /* Door arch details */
  ctx.beginPath();
  ctx.arc(tx, baseY-80*scale, 12*scale, Math.PI, 0);
  ctx.strokeStyle=gold; ctx.lineWidth=0.8*scale; ctx.stroke();

  /* Columns */
  [-65,-40,40,65].forEach(xo=>{
    fillPoly([xo-5,-30, xo+5,-30, xo+4,-110, xo-4,-110], stoneMid);
    /* capital */
    fillPoly([xo-8,-108, xo+8,-108, xo+6,-115, xo-6,-115], stoneLight);
  });

  /* Decorative horizontal bands on shikhara */
  for (let b=0;b<5;b++) {
    const y=-115-b*20;
    const bw=48-b*7;
    fillPoly([-bw,y, bw,y, bw-2,y-4, -(bw-2),y-4], stoneLight);
  }

  /* Lamps at base corners */
  [-70,70].forEach(xo=>{
    ctx.beginPath();
    ctx.arc(tx+xo*scale, baseY-38*scale, 4*scale, 0, Math.PI*2);
    ctx.fillStyle='rgba(255,200,80,0.85)'; ctx.fill();
    const lg=ctx.createRadialGradient(tx+xo*scale,baseY-38*scale,0,tx+xo*scale,baseY-38*scale,20*scale);
    lg.addColorStop(0,'rgba(255,190,50,0.35)');
    lg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=lg;
    ctx.beginPath(); ctx.arc(tx+xo*scale,baseY-38*scale,20*scale,0,Math.PI*2); ctx.fill();
  });

  /* Reflection on snowy ground */
  ctx.save();
  ctx.globalAlpha=0.06;
  ctx.scale(1,-0.3);
  ctx.translate(0, -(2*baseY/0.3 + 10*scale));
  ctx.beginPath();
  ctx.rect(tx-90*scale, baseY-280*scale, 180*scale, 280*scale);
  ctx.fillStyle='rgba(160,140,220,1)';
  ctx.fill();
  ctx.restore();
}

function mulberry32(a) {
  return function() {
    a|=0; a=a+0x6D2B79F5|0;
    var t=Math.imul(a^a>>>15,1|a);
    t=t+Math.imul(t^t>>>7,61|t)^t;
    return ((t^t>>>14)>>>0)/4294967296;
  };
}

   MAIN LOOP
═══════════════════════════════ */
function loop() {
  waveT += 0.028;
  drawGlobe();
  requestAnimationFrame(loop);
}

window.addEventListener('load', ()=>{
  drawBg();
  load();
  loop();
});

window.addEventListener('resize', drawBg);

document.getElementById('skill-name').addEventListener('input', save);
document.getElementById('hour-input').addEventListener('keydown', e=>{ if(e.key==='Enter') addHours(); });
document.getElementById('session-note').addEventListener('keydown', e=>{ if(e.key==='Enter') addHours(); });
document.getElementById('target-input').addEventListener('keydown', e=>{ if(e.key==='Enter') setTarget(); });
</script>
